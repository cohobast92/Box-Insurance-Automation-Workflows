<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="Architecture diagram for Box Insurance Automation Workflows for n8n">
  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .boxTitle { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .boxText { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .chip { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .arrowText { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #334155; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1280" height="760" fill="#f1f5f9"/>
  <text x="50" y="58" class="title">Box Insurance Automation Workflows for n8n</text>
  <text x="50" y="84" class="subtitle">Reference architecture for workflow orchestration, AI processing, and Box MCP integration</text>

  <rect x="50" y="120" width="250" height="570" rx="14" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="70" y="152" class="boxTitle">Operators / Users</text>
  <text x="70" y="178" class="boxText">- Trigger workflows manually</text>
  <text x="70" y="198" class="boxText">- Chat with AI agent flow</text>
  <text x="70" y="218" class="boxText">- Review generated outputs</text>

  <rect x="340" y="120" width="350" height="570" rx="14" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="360" y="152" class="boxTitle">n8n Runtime</text>
  <rect x="360" y="175" width="310" height="98" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="378" y="202" class="chip">Workflow Orchestration</text>
  <text x="378" y="224" class="boxText">Manual trigger, split/merge, routing, retries</text>
  <text x="378" y="244" class="boxText">Execution logging and node-level observability</text>

  <rect x="360" y="292" width="310" height="98" rx="10" fill="#ecfeff" stroke="#a5f3fc"/>
  <text x="378" y="319" class="chip">AI Processing Layer</text>
  <text x="378" y="341" class="boxText">OpenAI nodes for extraction and report generation</text>
  <text x="378" y="361" class="boxText">Structured prompts and JSON output contracts</text>

  <rect x="360" y="409" width="310" height="124" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="378" y="436" class="chip">Workflow Packs</text>
  <text x="378" y="458" class="boxText">- Claim Doc Generation</text>
  <text x="378" y="478" class="boxText">- Enhanced Metadata Extraction</text>
  <text x="378" y="498" class="boxText">- Insurance Triage / Reporting</text>
  <text x="378" y="518" class="boxText">- Chat-driven Box MCP Agent</text>

  <rect x="360" y="552" width="310" height="118" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="378" y="579" class="chip">Configuration and Secrets</text>
  <text x="378" y="601" class="boxText">Environment-driven values from .env</text>
  <text x="378" y="621" class="boxText">SSE endpoint and runtime settings</text>
  <text x="378" y="641" class="boxText">Credential mapping inside n8n</text>

  <rect x="730" y="120" width="250" height="270" rx="14" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="750" y="152" class="boxTitle">AI Provider</text>
  <text x="750" y="178" class="boxText">OpenAI API</text>
  <text x="750" y="200" class="boxText">- reasoning</text>
  <text x="750" y="220" class="boxText">- extraction</text>
  <text x="750" y="240" class="boxText">- report composition</text>

  <rect x="730" y="420" width="250" height="270" rx="14" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="750" y="452" class="boxTitle">Storage and State</text>
  <text x="750" y="478" class="boxText">Docker volume: /home/node/.n8n</text>
  <text x="750" y="500" class="boxText">Workflow metadata and credentials</text>
  <text x="750" y="522" class="boxText">Execution state and history</text>

  <rect x="1020" y="120" width="210" height="570" rx="14" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="1040" y="152" class="boxTitle">Box MCP Server</text>
  <text x="1040" y="178" class="boxText">SSE endpoint</text>
  <text x="1040" y="200" class="boxText">box_* tool calls:</text>
  <text x="1040" y="222" class="boxText">- search/list folders</text>
  <text x="1040" y="242" class="boxText">- metadata get/set/update</text>
  <text x="1040" y="262" class="boxText">- docgen batch</text>
  <text x="1040" y="282" class="boxText">- file upload/actions</text>

  <text x="1040" y="332" class="boxText">Connected Box Platform:</text>
  <text x="1040" y="354" class="boxText">- Documents</text>
  <text x="1040" y="374" class="boxText">- Metadata templates</text>
  <text x="1040" y="394" class="boxText">- Insurance claim assets</text>

  <line x1="300" y1="300" x2="340" y2="300" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="302" y="290" class="arrowText">UI / API</text>

  <line x1="690" y1="250" x2="730" y2="250" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="694" y="238" class="arrowText">HTTPS</text>

  <line x1="690" y1="500" x2="730" y2="500" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="693" y="490" class="arrowText">Persist</text>

  <line x1="690" y1="350" x2="1020" y2="350" stroke="#64748b" stroke-width="2.6" marker-end="url(#arrow)"/>
  <text x="828" y="338" class="arrowText">SSE / MCP tool invocation</text>

  <line x1="1020" y1="430" x2="690" y2="430" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="800" y="420" class="arrowText">Tool responses (JSON)</text>

  <rect x="50" y="706" width="1180" height="34" rx="8" fill="#e2e8f0"/>
  <text x="68" y="728" class="subtitle">Deployment note: use reverse proxy + HTTPS, rotate credentials, and wire error-trigger alerting for production operations.</text>
</svg>
